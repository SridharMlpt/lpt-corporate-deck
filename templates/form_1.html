<!DOCTYPE html>
<html>
<head>
    <title>Corporate Deck Access</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        input{
            width:100%;
            padding:12px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        h2{
            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>View Corporate Deck</h2>

    <form action="/submit" method="POST">

        <input type="text" name="name" placeholder="Enter Name" required>

        <input type="email" name="email" placeholder="Enter Email" required>

        <input type="text" name="phone" placeholder="Enter Phone Number" required>

        <button type="submit">
            View PDF
        </button>

    </form>

</div>

</body>
</html>
